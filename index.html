<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>세별보험: 무한 안전계단</title>
    <script type="module" crossorigin src="./assets/index-CGEMSKET.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BGjJ1IjM.css">
  </head>
  <body>
    <main id="app">
      <canvas id="game" width="900" height="1280" aria-label="세별보험 무한 안전계단 게임"></canvas>
      <section class="hud" aria-label="게임 정보">
        <div class="brand">
          <span class="brand-mark">S</span>
          <div>
            <strong>세별보험</strong>
            <small>무한 안전계단</small>
          </div>
        </div>
        <div class="stats">
          <span id="score">0</span>
          <small>점검 완료</small>
        </div>
        <div class="badges">
          <span id="combo">COMBO 0</span>
          <span id="shield">보장 1</span>
        </div>
      </section>
      <nav class="controls" aria-label="게임 조작">
        <button id="leftBtn" type="button">↙</button>
        <button id="rightBtn" type="button">↗</button>
      </nav>
      <button class="restart" id="restartBtn" type="button">다시 점검</button>
    </main>
  </body>
</html>
